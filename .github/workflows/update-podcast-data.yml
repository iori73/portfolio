name: Update Podcast Data

on:
  schedule:
    - cron: '0 0 * * 0'  # 毎週日曜 0時 (UTC)
  workflow_dispatch:       # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run podcast data pipeline
        run: node scripts/generate-podcast-data.js
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PODCAST_DB_ID: ${{ secrets.NOTION_PODCAST_DB_ID }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/podcast-notes.json
          git diff --staged --quiet || git commit -m "chore: update podcast data"
          git push
