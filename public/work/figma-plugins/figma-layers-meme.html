<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Figma layers meme</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      font-family: system-ui, -apple-system, sans-serif;
    }
    .frame {
      position: relative;
      max-width: 800px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
    }
    .frame img {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: top;
    }
    .overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 20px;
      background: linear-gradient(rgba(0,0,0,0.75) 0%, transparent 100%);
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    }
    .overlay {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 20px 24px 24px;
      background: linear-gradient(transparent 0%, rgba(0,0,0,0.85) 30%);
      color: #fff;
    }
    .line1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
      text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .line2 {
      margin-top: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="frame">
    <img src="figma-layers-screenshot.png" alt="Figma Layers panel" />
    <div class="overlay-top">POV: You said “just one more SVG”</div>
    <div class="overlay">
      <p class="line1">Naming layers? In this economy?</p>
      <p class="line2">— Frame 2147224479, probably</p>
    </div>
  </div>
</body>
</html>
