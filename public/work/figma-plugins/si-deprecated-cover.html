<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Screenshot Importer — Deprecated Cover</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }

  .cover {
    position: relative;
    width: 1920px;
    height: 960px;
    overflow: hidden;
    background: #f5f5f7;
  }

  /* Top strip — matches Figma Community cover (UPDATED) */
  .top-updated {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 14px 24px;
    background: #fff3a0;
    border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    letter-spacing: 0.2em;
    color: #1a1a1a;
    z-index: 20;
  }

  .cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(40%) brightness(0.85);
  }

  /* Semi-transparent overlay */
  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(255, 255, 255, 0.45);
  }

  /* Bottom banner */
  .banner {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: linear-gradient(135deg, #0ACF83 0%, #1ABCFE 100%);
    padding: 40px 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }

  .banner-left {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .banner-label {
    font-size: 18px;
    font-weight: 500;
    color: rgba(255, 255, 255, 0.85);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .banner-title {
    font-size: 38px;
    font-weight: 800;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .banner-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(8px);
    border-radius: 8px;
    padding: 6px 14px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }

  .banner-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .arrow-circle {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.25);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .arrow-circle svg {
    width: 28px;
    height: 28px;
    fill: #fff;
  }

  /* Center content — faded original title + redirect */
  .center-message {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -52%);
    text-align: center;
    z-index: 5;
  }

  .original-title {
    font-size: 64px;
    font-weight: 800;
    color: rgba(0, 0, 0, 0.12);
    letter-spacing: -1px;
    line-height: 1.1;
  }

  .redirect-text {
    margin-top: 20px;
    font-size: 28px;
    font-weight: 600;
    color: #333;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .redirect-text .arrow {
    font-size: 32px;
    color: #0ACF83;
  }

  /* Diagonal stripes pattern — subtle */
  .stripes {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 40px,
      rgba(0, 0, 0, 0.02) 40px,
      rgba(0, 0, 0, 0.02) 42px
    );
    z-index: 3;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="cover">
    <img src="si-cover-cropped.png" alt="Screenshot Importer cover">
    <div class="overlay"></div>
    <div class="stripes"></div>

    <div class="top-updated" aria-label="Updated">🙂 UPDATED 🙂</div>

    <div class="center-message">
      <div class="original-title">Screenshot Importer</div>
      <div class="redirect-text">
        <span class="arrow">→</span>
        Now available as <strong style="color: #0ACF83; margin-left: 6px;">Bulk Screenshot Importer</strong>
      </div>
    </div>

    <div class="banner">
      <div class="banner-left">
        <div class="banner-label">Upgraded & Expanded</div>
        <div class="banner-title">
          Bulk Screenshot Importer
          <div class="banner-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
            + AI Smart Import
          </div>
        </div>
      </div>
      <div class="banner-right">
        <div class="arrow-circle">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
